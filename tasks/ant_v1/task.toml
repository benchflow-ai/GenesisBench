version = "1.0"
name = "ant_v1"
title = "GenesisBench Ant Policy Improvement v1"

[metadata]
description = "Improve a programmatic Ant locomotion policy under a fixed research budget."
author = "GenesisBench Contributors"
category = "locomotion"
difficulty = "medium"
tags = ["mujoco", "continuous-control", "policy-search", "robotics"]
reference_task = true

[environment]
id = "Ant-v5"
observation_size = 27
action_size = 8
max_episode_steps = 1000
contact_cost_weight = 0.0
include_contact_forces_in_observation = false

[development]
episodes = 3
max_steps = 300
seeds = [0, 1, 2]

[starter]
path = "starter_policy"

[submission]
directory = "final_policy"
entrypoint = "policy.py"

[budget]
wall_clock_minutes = 30

[verifier]
entrypoint = "verifier/evaluate_hidden.py"
reproduction_config = "verifier/config.toml"
anchors = "verifier/anchors.json"
supports_private_config = true
